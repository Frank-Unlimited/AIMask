        content: "小米"
        should_mask: false
      - label: "对方组织"
        content: "苹果"
        should_mask: false
      - label: "内部信息"
        content: "从内部渠道了解到"
        should_mask: true
      - label: "业务机密"
        content: "他们的供应链成本比我们高 15%"
        should_mask: true
      - label: "内部信息"
        content: "根据我们的卧底反馈"
        should_mask: true
      - label: "业务机密"
        content: "他们计划在 Q2 推出高端系列，定价在 2000-3000 元区间"
