      整体表现：技术部 25 人，优秀 8 人，良好 12 人，合格 4 人，待改进 1 人。团队整体战斗力较强。
      重点人员：
      1. 张伟（架构师）：技术能力突出，主导了三个核心项目，建议晋升为技术总监，薪资从 35K 调整至 50K。
      2. 李娜（前端组长）：工作态度积极，但管理能力有待提升，团队成员反馈她经常情绪化，影响团队氛围。建议保持现职，薪资微调至 28K。
      3. 赵强（后端开发）：这是待改进的那一位，代码质量差，多次延误项目进度，与同事关系紧张。建议列入淘汰名单，如果 Q1 仍无改善，建议劝退。
      薪资调整预算：技术部总薪资从 65 万/月调整至 72 万/月，增幅 10.8%。
      以上请您审阅。
