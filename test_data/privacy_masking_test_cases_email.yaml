  - id: 1
    name: "商务邮件-方案确认"
    description: "广告公司市场总监向客户发送方案确认邮件，需要分享给第三方征求意见。用户希望隐藏己方联系方式和核心创意，但保留客户信息。"
    input_text: |
      确认广告设计方案
      2026-01-22 14:41:01
      尊敬的启迪科技团队：
      您好！希望这封邮件能找到您一切安好。我写信是为了确认我们在上次会议中讨论的广告设计方案的细节。贵团队的洞察和建议对于我们广告活动的方向非常宝贵。
      根据我们的讨论，建议的设计将采用生动的色彩和现代字体，旨在吸引我们的目标观众的注意。我们计划在所有视觉元素中使用标语"创造无限可能"，以保持一致的品牌信息。此外，布局将优先考虑清晰和影响力，重要信息将被突出显示，确保其立即引人注目。
      我们已经整合了贵公司李华经理的反馈，特别是关于布局调整的建议，我们相信这将增强活动的整体效果。请李经理审阅附加的草案，并确认是否符合启迪科技的期望。
      感谢您的持续合作和信任，期待我们能一同打造一场成功的活动。
      最诚挚的问候
      王雷
      市场总监
      迅达广告有限公司
      北京市朝阳区建国路 88 号
      wang.lei@xundamedia.com
      +86 138 0000 0000
    expected_output:
      - label: "己方姓名"
        content: "王雷"
        should_mask: true
      - label: "己方联系方式"
        content: "+86 138 0000 0000"
        should_mask: true
      - label: "己方联系方式"
        content: "wang.lei@xundamedia.com"
        should_mask: true
      - label: "己方联系方式"
        content: "北京市朝阳区建国路 88 号"
        should_mask: true
      - label: "对方姓名"
        content: "李华"
        should_mask: false
      - label: "对方姓名"
        content: "李华经理"
        should_mask: false
      - label: "对方姓名"
        content: "李经理"
        should_mask: false
      - label: "对方组织"
        content: "启迪科技"
        should_mask: false
      - label: "己方组织"
        content: "迅达广告有限公司"
        should_mask: true
      - label: "业务机密"
        content: "采用生动的色彩和现代字体"
        should_mask: true
      - label: "业务机密"
        content: "创造无限可能"
        should_mask: true
      - label: "业务机密"
        content: "布局将优先考虑清晰和影响力"
        should_mask: true
    test_points:
      - "测试同类信息差异化：多个人名中区分己方和对方"
      - "测试语义关联：识别同一人的不同称呼"
      - "测试主观隐私识别：识别方案中的核心创意"
    why_traditional_fails: "传统工具只能识别所有人名和联系方式，无法区分身份和角色"

  - id: 2
    name: "商务邮件-报价洽谈"
    description: "软件公司销售经理向客户发送报价邮件，需要分享给上级审批。用户希望隐藏成本和利润信息，但保留报价总额。"
    input_text: |
      关于企业管理系统项目报价
      2026-01-25 10:15:33
      尊敬的张总：
      感谢您对我们云端科技的关注。根据贵公司的需求，我们为您定制了以下解决方案。
      项目总报价为人民币 85 万元，包含系统开发、部署实施和一年技术支持。具体模块包括：人事管理模块（18万）、财务管理模块（25万）、项目管理模块（22万）、数据分析模块（20万）。
      我们的成本控制在 52 万左右，这个报价已经给到了非常优惠的折扣，利润空间仅有 15%，远低于行业平均的 30%。考虑到贵公司是我们在制造业的标杆客户，我们愿意在此基础上再让利 3 个点。
      张总您提到的实时库存追踪功能，我们的技术团队评估后认为这是核心亮点，建议作为一期重点开发。我们计划采用微服务架构配合 Redis 缓存，确保响应时间在 100ms 以内。
      期待您的回复。
      此致
      敬礼
      陈明
      销售经理
      云端科技有限公司
      上海市浦东新区世纪大道 1500 号
      chen.ming@cloudtech.com
      +86 139 1234 5678
    expected_output:
      - label: "己方姓名"
        content: "陈明"
        should_mask: true
      - label: "己方联系方式"
        content: "+86 139 1234 5678"
        should_mask: true
      - label: "己方联系方式"
        content: "chen.ming@cloudtech.com"
        should_mask: true
      - label: "己方联系方式"
        content: "上海市浦东新区世纪大道 1500 号"
        should_mask: true
      - label: "对方姓名"
        content: "张总"
        should_mask: false
      - label: "己方组织"
        content: "云端科技"
        should_mask: true
      - label: "己方组织"
        content: "云端科技有限公司"
        should_mask: true
      - label: "业务机密"
        content: "成本控制在 52 万左右"
        should_mask: true
      - label: "业务机密"
        content: "利润空间仅有 15%"
        should_mask: true
      - label: "业务机密"
        content: "远低于行业平均的 30%"
        should_mask: true
      - label: "业务机密"
        content: "再让利 3 个点"
        should_mask: true
      - label: "业务机密"
        content: "采用微服务架构配合 Redis 缓存"
        should_mask: true
      - label: "业务机密"
        content: "响应时间在 100ms 以内"
        should_mask: true
    test_points:
      - "测试商业机密识别：成本、利润、让利策略等敏感信息"
      - "测试技术方案保护：核心技术架构和性能指标"
      - "测试差异化处理：报价总额不打码，但成本利润打码"
    why_traditional_fails: "传统工具无法理解哪些数字是商业机密，哪些是可公开的报价"

  - id: 3
    name: "商务邮件-融资邀请"
    description: "创业公司CEO向投资人发送合作邀请，需要分享给团队讨论。用户希望隐藏融资计划和核心技术，但保留投资人信息。"
    input_text: |
      诚邀参与智能教育项目
      2026-01-28 16:20:15
      尊敬的李总：
      我是慧学科技的创始人兼CEO刘洋，非常荣幸能有机会向您介绍我们的项目。
      我们专注于K12在线教育领域，通过AI技术为学生提供个性化学习方案。目前已服务 5000+ 学生，月活跃用户增长率达 40%，用户留存率 85%。我们的核心竞争力在于自研的知识图谱算法，能够精准定位学生的薄弱环节。
      本轮我们计划融资 800 万人民币，出让 15% 股权，主要用于技术团队扩充和市场推广。目前已有两家机构表达了明确的投资意向，估值在 5000 万左右。
      李总您在教育行业有丰富的投资经验，特别是您投资的"学而优"项目，其发展路径与我们非常相似。如果能得到您的支持，不仅是资金上的帮助，更重要的是您的行业资源和战略指导。
      我的联系方式是 liu.yang@huixue.com，手机 +86 138 8888 6666。期待有机会当面向您详细汇报。
      顺祝商祺
      刘洋
      创始人兼CEO
      慧学科技
      北京市海淀区中关村大街 27 号
    expected_output:
      - label: "己方姓名"
        content: "刘洋"
        should_mask: true
      - label: "己方联系方式"
        content: "+86 138 8888 6666"
        should_mask: true
      - label: "己方联系方式"
        content: "liu.yang@huixue.com"
        should_mask: true
      - label: "己方联系方式"
        content: "北京市海淀区中关村大街 27 号"
        should_mask: true
      - label: "对方姓名"
        content: "李总"
        should_mask: false
      - label: "己方组织"
        content: "慧学科技"
        should_mask: true
      - label: "业务机密"
        content: "自研的知识图谱算法"
        should_mask: true
      - label: "业务机密"
        content: "融资 800 万人民币"
        should_mask: true
      - label: "业务机密"
        content: "出让 15% 股权"
        should_mask: true
      - label: "业务机密"
        content: "估值在 5000 万左右"
        should_mask: true
      - label: "业务机密"
        content: "已有两家机构表达了明确的投资意向"
        should_mask: true
    test_points:
      - "测试融资敏感信息：金额、股权、估值、竞争情况"
      - "测试核心技术保护：自研算法等技术机密"
      - "测试关系判断：对方的投资案例不打码"
    why_traditional_fails: "传统工具无法理解融资相关的敏感性，也无法区分己方技术和对方案例"

  - id: 4
    name: "商务邮件-客户投诉处理"
    description: "客服经理回复客户投诉，需要分享给质量部门。用户希望隐藏内部处理流程和补偿成本，但保留客户问题描述。"
    input_text: |
      关于订单问题的处理方案
      2026-01-30 09:45:22
      尊敬的赵女士：
      非常抱歉给您带来了不愉快的购物体验。关于您反馈的订单 SN202601280156 商品质量问题，我们已经进行了详细调查。
      经核实，该批次产品确实存在包装密封不严的问题，是我们供应商环节出现了疏漏。我们已经对供应商进行了严厉警告，并要求其整改生产流程。内部我们也对质检主管老王进行了批评教育，他承认在抽检环节存在疏忽。
      针对您的情况，我们提供以下补偿方案：1) 全额退款并额外补偿 200 元代金券；2) 免费更换新品并赠送价值 150 元的礼品。我们的成本预算是控制在 300 元以内，这个方案已经是我们能给到的最大诚意。
      另外，我们发现同批次还有 15 个订单可能存在类似问题，已经主动联系客户进行处理，预计总损失在 5000 元左右。
      再次为给您带来的不便深表歉意，期待您的谅解。
      此致
      敬礼
      周敏
      客服经理
      优品商城
      客服热线：400-888-9999
      zhou.min@youpin.com
      +86 137 2222 3333
    expected_output:
      - label: "己方姓名"
        content: "周敏"
        should_mask: true
      - label: "己方姓名"
        content: "老王"
        should_mask: true
      - label: "己方联系方式"
        content: "+86 137 2222 3333"
        should_mask: true
      - label: "己方联系方式"
        content: "zhou.min@youpin.com"
        should_mask: true
      - label: "对方联系方式"
        content: "400-888-9999"
        should_mask: false
      - label: "对方姓名"
        content: "赵女士"
        should_mask: false
      - label: "己方组织"
        content: "优品商城"
        should_mask: true
      - label: "内部信息"
        content: "对质检主管老王进行了批评教育"
        should_mask: true
      - label: "内部信息"
        content: "对供应商进行了严厉警告"
        should_mask: true
      - label: "业务机密"
        content: "成本预算是控制在 300 元以内"
        should_mask: true
      - label: "内部信息"
        content: "同批次还有 15 个订单可能存在类似问题"
        should_mask: true
      - label: "内部信息"
        content: "预计总损失在 5000 元左右"
        should_mask: true
    test_points:
      - "测试内部处理流程保护：对员工的批评、供应商处理"
      - "测试成本数据保护：补偿成本、总损失"
      - "测试电话差异化：客服热线（公开）vs 个人手机（私密）"
    why_traditional_fails: "传统工具无法理解内部处理流程的敏感性，也无法区分公开热线和私人电话"

  - id: 5
    name: "商务邮件-竞品分析"
    description: "市场分析师分享竞品分析报告，需要转发给外部顾问。用户希望隐藏情报来源和己方战略，但保留竞品公开信息。"
    input_text: |
      竞品分析报告-智能手表市场
      2026-02-01 14:30:00
      各位同事：
      根据我们的市场调研，目前智能手表市场的主要竞争对手分析如下：
      华为Watch系列：市场份额约 28%，主打健康监测功能。他们的弱点是生态系统封闭，第三方应用较少。我们从内部渠道了解到，他们的供应链成本比我们高 15%，这给了我们价格优势。
      小米手表：市场份额约 22%，主打性价比。根据我们的卧底反馈，他们计划在 Q2 推出高端系列，定价在 2000-3000 元区间，这将直接冲击我们的主力产品线。
      苹果Watch：市场份额约 35%，品牌溢价明显。我们的策略是避开正面竞争，专注中端市场。
      基于以上分析，我建议我们的新品定价在 1500 元，主打续航和运动功能。预计能抢占 8-10% 的市场份额，实现年销售额 2 亿的目标。
      这份报告仅供内部参考，请勿外传。
      孙杰
      市场分析师
      智芯科技
      sun.jie@zhixin.com
      +86 136 5555 7777
